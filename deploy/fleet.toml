# Protectinator Fleet Configuration for Euclid
# Tailscale hostnames used for all connectivity

[settings]
parallel = 4
save_history = true

# Remote hosts to scan
# Add more hosts as they join the tailnet

[[hosts]]
name = "euclid"
host = "euclid"
user = "erewhon"
sudo = true
scan_containers = true

[[hosts]]
name = "archimedes"
host = "archimedes"
user = "erewhon"
sudo = true

[[hosts]]
name = "hypatia"
host = "hypatia"
user = "erewhon"
sudo = true

[[hosts]]
name = "merope"
host = "merope"
user = "erewhon"
sudo = true

[[hosts]]
name = "delphi"
host = "delphi"
user = "erewhon"
sudo = true
scan_containers = true

# Container scanning
[containers]
scan_all = true

# Source repositories to scan (paths on the scanning host)

[[repos]]
path = "~/Projects/erewhon/protectinator"
ecosystem = "rust"

[[repos]]
path = "~/Projects/erewhon/hub"

[[repos]]
path = "~/Projects/erewhon/llm-router"

# Webhook notifications (optional)
# [notifications.webhook]
# url = "https://hooks.example.com/protectinator"
# on = ["new_critical", "new_high"]
