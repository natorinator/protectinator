name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Build
        run: cargo zigbuild --release --target ${{ matrix.target }} -p protectinator

      - name: Rename binary
        run: |
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
            cp target/${{ matrix.target }}/release/protectinator protectinator-linux-x86_64
          else
            cp target/${{ matrix.target }}/release/protectinator protectinator-linux-arm64
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protectinator-${{ matrix.target }}
          path: protectinator-linux-*

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p protectinator

      - name: Rename binary
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            cp target/${{ matrix.target }}/release/protectinator protectinator-macos-arm64
          else
            cp target/${{ matrix.target }}/release/protectinator protectinator-macos-x86_64
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protectinator-${{ matrix.target }}
          path: protectinator-macos-*

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/ || echo "No artifacts found"

      - name: Create Release
        if: ${{ hashFiles('artifacts/*') != '' }}
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
