name: Release Build

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Build
        run: cargo zigbuild --release --target ${{ matrix.target }} -p protectinator

      - name: Rename binary
        run: |
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
            cp target/${{ matrix.target }}/release/protectinator protectinator-linux-x86_64
          else
            cp target/${{ matrix.target }}/release/protectinator protectinator-linux-arm64
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protectinator-${{ matrix.target }}
          path: protectinator-linux-*

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p protectinator

      - name: Rename binary
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            cp target/${{ matrix.target }}/release/protectinator protectinator-macos-arm64
          else
            cp target/${{ matrix.target }}/release/protectinator protectinator-macos-x86_64
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protectinator-${{ matrix.target }}
          path: protectinator-macos-*

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    if: ${{ always() && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'release') }}
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/ || echo "No artifacts found"

      - name: Create Release
        if: ${{ hashFiles('artifacts/*') != '' }}
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' }}
    steps:
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "version=${{ github.event.release.tag_name }}" | sed 's/^version=v/version=/' >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for release assets
        run: sleep 10

      - name: Download release binaries and compute checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE_URL="https://github.com/erewhon/protectinator/releases/download/v${VERSION}"
          for binary in protectinator-linux-x86_64 protectinator-linux-arm64 protectinator-macos-arm64 protectinator-macos-x86_64; do
            curl -fsSL -o "$binary" "${BASE_URL}/${binary}"
            sha256sum "$binary" | awk '{print $1}' > "${binary}.sha256"
          done

      - name: Generate formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_LINUX_X86=$(cat protectinator-linux-x86_64.sha256)
          SHA_LINUX_ARM=$(cat protectinator-linux-arm64.sha256)
          SHA_MACOS_ARM=$(cat protectinator-macos-arm64.sha256)
          SHA_MACOS_X86=$(cat protectinator-macos-x86_64.sha256)

          cat > protectinator.rb << FORMULA
          class Protectinator < Formula
            desc "Portable, zero-config security monitoring tool"
            homepage "https://github.com/erewhon/protectinator"
            version "${VERSION}"
            license "MIT OR Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/erewhon/protectinator/releases/download/v${VERSION}/protectinator-macos-arm64"
                sha256 "${SHA_MACOS_ARM}"
              end

              on_intel do
                url "https://github.com/erewhon/protectinator/releases/download/v${VERSION}/protectinator-macos-x86_64"
                sha256 "${SHA_MACOS_X86}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/erewhon/protectinator/releases/download/v${VERSION}/protectinator-linux-arm64"
                sha256 "${SHA_LINUX_ARM}"
              end

              on_intel do
                url "https://github.com/erewhon/protectinator/releases/download/v${VERSION}/protectinator-linux-x86_64"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            def install
              if OS.mac?
                if Hardware::CPU.arm?
                  bin.install "protectinator-macos-arm64" => "protectinator"
                else
                  bin.install "protectinator-macos-x86_64" => "protectinator"
                end
              elsif OS.linux?
                if Hardware::CPU.arm?
                  bin.install "protectinator-linux-arm64" => "protectinator"
                else
                  bin.install "protectinator-linux-x86_64" => "protectinator"
                end
              end
            end

            test do
              assert_match "protectinator", shell_output("#{bin}/protectinator --help")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' protectinator.rb

      - name: Update homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/erewhon/homebrew-tap.git
          mkdir -p homebrew-tap/Formula
          cp protectinator.rb homebrew-tap/Formula/protectinator.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/protectinator.rb
          git diff --cached --quiet || git commit -m "Update protectinator to v${{ steps.version.outputs.version }}"
          git push
